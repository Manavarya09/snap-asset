name: CI

on:
  push:
    branches: [ main, 'phase/**' ]
  pull_request:
    branches: [ main, 'phase/**' ]

jobs:
  test:
    name: Node.js tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (optional)
        run: npx playwright install --with-deps || true

      - name: Run tests
        run: npm test
        env:
          CI: true

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - run: npm ci
      - name: Run lint
        run: |
          if npm run -s lint; then echo "lint passed"; else echo "lint step skipped or failed"; fi
