name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [ 'phase/**' ]
  pull_request:
    branches: [ 'phase/**' ]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm test -- tests/e2e.test.js
        env:
          CI: true
